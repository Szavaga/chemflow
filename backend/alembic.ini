[alembic]
# Path to the alembic migration directory (relative to this file)
script_location = alembic

# Prepend the backend/ directory to sys.path so "app.*" imports work
prepend_sys_path = .

# Migration file naming: YYYYMMDD_<rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

# sqlalchemy.url is overridden at runtime inside env.py from app settings;
# this entry is a fallback used only by offline tooling / IDE plugins.
sqlalchemy.url = postgresql+asyncpg://chemflow:chemflow@localhost:5432/chemflow


# ── Logging ──────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
